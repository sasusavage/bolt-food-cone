workflows:
  campus-eats:
    name: Campus Eats - Android & iOS
    max_build_duration: 60
    working_directory: campus_eats_app

    environment:
      flutter: stable

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Build Android APK
        script: flutter build apk --debug

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r CampusEats.ipa Payload
          mv CampusEats.ipa ../../../CampusEats.ipa

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - CampusEats.ipa

    publishing:
      email:
        recipients:
          - sasuisaac332@gmail.com
        notify:
          success: true
          failure: true
